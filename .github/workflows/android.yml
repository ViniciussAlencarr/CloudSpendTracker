name: Android CI

# Esse robô roda toda vez que você faz um Push para a branch main
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Setup do Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

      - name: Rodar Testes Unitários
        run: ./gradlew testDebugUnitTest

      - name: Build do APK Debug
        run: ./gradlew assembleDebug